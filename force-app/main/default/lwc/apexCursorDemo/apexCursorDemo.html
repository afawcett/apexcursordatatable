<template>
    <lightning-card title="Infinite Loading" icon-name="standard:account">
        <lightning-button
            slot="actions"
            label="Refresh"
            icon-name="utility:refresh"
            disabled={isLoading}
            onclick={handleRefresh}>
        </lightning-button>
        <div class="slds-var-m-bottom_medium slds-var-p-left_medium">
            <lightning-radio-group
                label="Cursor Type"
                variant="label-hidden"
                options={cursorTypeOptions}
                value={cursorType}
                type="button"
                onchange={handleCursorTypeChange}>
            </lightning-radio-group>
            <lightning-input
                type="checkbox"
                label="Use Session Cache"
                checked={useSessionCache}
                onchange={handleSessionCacheChange}>
            </lightning-input>
        </div>
        <div class="datatable-container slds-is-relative datatable-height">
            <lightning-datatable
                key-field="Id"
                data={records}
                onloadmore={onLoadMoreRecords}
                columns={columns}
                enable-infinite-loading={allowInfiniteLoading}
                hide-checkbox-column
                show-row-number-column>
            </lightning-datatable>
            <div class="infinite-symbol slds-is-absolute">∞</div>
        </div>
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </template>
        <template if:true={error}>
            <div class="slds-notify slds-notify_alert slds-theme_error" role="alert">
                <span class="slds-assistive-text">error</span>
                <h2>{error}</h2>
            </div>
        </template>
        <div class="slds-grid slds-gutters slds-wrap info-panels slds-var-m-top_medium slds-var-p-horizontal_medium slds-var-p-bottom_medium">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <div class="slds-box slds-theme_info info-panel">
                    <h4 class="slds-text-heading_small slds-var-m-bottom_x-small">Debug Info</h4>
                    <template if:true={debugInfo}>
                        <p>Loaded Records: {debugInfo.loadedRecords}</p>
                        <p>Total Records: {debugInfo.totalRecords}</p>
                        <p>Has More: {debugInfo.hasMore}</p>
                        <p>Cursor Type: {debugInfo.cursorTypeLabel}</p>
                        <p>Using Session Cache: {debugInfo.usingSessionCache}</p>
                        <template if:true={debugInfo.isPagination}>
                            <p>Deleted Rows Skipped: {debugInfo.deletedRows}</p>
                        </template>
                    </template>
                    <template if:false={debugInfo}>
                        <p>Debug info unavailable</p>
                    </template>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <div class="slds-box slds-theme_shade info-panel">
                    <h4 class="slds-text-heading_small slds-var-m-bottom_x-small">Limits Info</h4>
                    <template if:true={limitsInfo}>
                        <p class="slds-text-title_caps slds-var-m-top_x-small">Transaction</p>
                        <p>Standard Cursors: {limitsInfo.apexCursors}/{limitsInfo.limitApexCursors}</p>
                        <p>Standard Cursor Rows: {limitsInfo.apexCursorRows}/{limitsInfo.limitApexCursorRows}</p>
                        <p>Pagination Cursors: {limitsInfo.apexPaginationCursors}/{limitsInfo.limitApexPaginationCursors}</p>
                        <p>Pagination Cursor Rows: {limitsInfo.apexPaginationCursorRows}/{limitsInfo.limitApexPaginationCursorRows}</p>
                        <p>Fetch Calls: {limitsInfo.fetchCallsOnApexCursor}/{limitsInfo.limitFetchCallsOnApexCursor}</p>
                        <p class="slds-text-title_caps slds-var-m-top_x-small">Daily (Org)</p>
                        <p>Daily Standard Cursors: {limitsInfo.dailyApexCursors}/{limitsInfo.limitDailyApexCursors}</p>
                        <p>Daily Pagination Cursors: {limitsInfo.dailyApexPaginationCursors}/{limitsInfo.limitDailyApexPaginationCursors}</p>
                        <p>Daily Cursor Rows: {limitsInfo.dailyApexCursorRows}/{limitsInfo.limitDailyApexCursorRows}</p>
                    </template>
                    <template if:false={limitsInfo}>
                        <p>Limits unavailable</p>
                    </template>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
